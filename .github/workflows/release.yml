name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  PUBLISH_DIR: artifacts/publish/win-x64
  VELOPACK_VERSION: 1.2.0
  VELOPACK_RELEASE_DIR: artifacts/velopack/releases

jobs:
  release:
    name: Build, package, and release
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tags must start with 'v'. Received: $tag"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "Release tag must look like v0.1.0 or v0.1.0-beta.1. Received: $tag"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore PullWatch.sln -p:Platform=${{ env.PLATFORM }}

      - name: Build
        run: dotnet build PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -p:Platform=${{ env.PLATFORM }} -p:Version=${{ steps.release-tag.outputs.version }} -p:InformationalVersion=${{ steps.release-tag.outputs.version }}

      - name: Test
        run: dotnet test PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build -p:Platform=${{ env.PLATFORM }}

      - name: Publish
        shell: pwsh
        run: ./scripts/publish-win-x64.ps1 -OutputPath ${{ env.PUBLISH_DIR }} -Version ${{ steps.release-tag.outputs.version }}

      - name: Install Velopack CLI
        run: dotnet tool install --tool-path .tools vpk --version ${{ env.VELOPACK_VERSION }}

      - name: Package Velopack release
        id: package
        shell: pwsh
        run: |
          $releaseDir = "${{ env.VELOPACK_RELEASE_DIR }}"

          if (Test-Path -LiteralPath $releaseDir) {
            Remove-Item -LiteralPath $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          .\.tools\vpk.exe pack `
            --packId PullWatch `
            --packTitle PullWatch `
            --packVersion ${{ steps.release-tag.outputs.version }} `
            --packDir ${{ env.PUBLISH_DIR }} `
            --mainExe PullWatch.exe `
            --outputDir $releaseDir `
            --icon .\PullWatch.App\Assets\favicon.ico `
            --shortcuts Desktop,StartMenuRoot `
            --runtime win-x64 `
            --framework vcredist143-x64

          $releaseFiles = @(
            Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name
          )

          if ($releaseFiles.Count -eq 0) {
            throw "Velopack did not produce any release files in $releaseDir"
          }

          $checksumPath = Join-Path $releaseDir "PullWatch-${{ steps.release-tag.outputs.tag }}-win-x64.sha256"
          $checksumLines = $releaseFiles | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          }
          Set-Content -LiteralPath $checksumPath -Value $checksumLines -Encoding ASCII

          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT

      - name: Upload Velopack artifact
        uses: actions/upload-artifact@v7
        with:
          name: PullWatch-${{ steps.release-tag.outputs.tag }}-velopack-win-x64
          path: ${{ steps.package.outputs.release_dir }}/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release-tag.outputs.tag }}"
          $releaseDir = "${{ steps.package.outputs.release_dir }}"
          $releaseFiles = @(
            Get-ChildItem -LiteralPath $releaseDir -File |
              Sort-Object Name |
              ForEach-Object { $_.FullName }
          )
          $title = "PullWatch $tag"

          if ($releaseFiles.Count -eq 0) {
            throw "No Velopack release files found in $releaseDir"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $title --generate-notes --verify-tag
          }

          foreach ($releaseFile in $releaseFiles) {
            gh release upload $tag $releaseFile --clobber
          }
