name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  PUBLISH_DIR: artifacts/publish/win-x64
  VELOPACK_VERSION: 1.2.0
  VELOPACK_RELEASE_DIR: artifacts/velopack/releases
  FFMPEG_DOWNLOAD_URL: https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.1.2-essentials_build.zip
  FFMPEG_SHA256: db580001caa24ac104c8cb856cd113a87b0a443f7bdf47d8c12b1d740584a2ec

jobs:
  release:
    name: Build, package, and release
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        id: release-tag
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          $tag = $env:REF_NAME
          $prerelease = "false"
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $tag = $env:INPUT_TAG
            $prerelease = $env:INPUT_PRERELEASE
          }

          if (-not $tag.StartsWith("v")) {
            throw "Release tags must start with 'v'. Received: $tag"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "Release tag must look like v0.1.0 or v0.1.0-beta.1. Received: $tag"
          }

          if ($version -match '^\d+\.\d+\.\d+-') {
            $prerelease = "true"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore PullWatch.sln -p:Platform=${{ env.PLATFORM }}

      - name: Build
        run: dotnet build PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -p:Platform=${{ env.PLATFORM }} -p:Version=${{ steps.release-tag.outputs.version }} -p:InformationalVersion=${{ steps.release-tag.outputs.version }}

      - name: Test
        run: dotnet test PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build -p:Platform=${{ env.PLATFORM }}

      - name: Publish
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release-tag.outputs.version }}
        run: ./scripts/publish-win-x64.ps1 -OutputPath $env:PUBLISH_DIR -Version $env:RELEASE_VERSION -FfmpegDownloadUrl $env:FFMPEG_DOWNLOAD_URL -FfmpegSha256 $env:FFMPEG_SHA256

      - name: Install Velopack CLI
        run: dotnet tool install --tool-path .tools vpk --version ${{ env.VELOPACK_VERSION }}

      - name: Package Velopack release
        id: package
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release-tag.outputs.version }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          $releaseDir = $env:VELOPACK_RELEASE_DIR

          if (Test-Path -LiteralPath $releaseDir) {
            Remove-Item -LiteralPath $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          .\.tools\vpk.exe pack `
            --packId PullWatch.Desktop `
            --packTitle PullWatch `
            --packVersion $env:RELEASE_VERSION `
            --packDir $env:PUBLISH_DIR `
            --mainExe PullWatch.exe `
            --outputDir $releaseDir `
            --icon .\PullWatch.App\Assets\favicon.ico `
            --shortcuts Desktop,StartMenuRoot `
            --runtime win-x64 `
            --noPortable

          $releaseFiles = @(
            Get-ChildItem -LiteralPath $releaseDir -File | Sort-Object Name
          )

          if ($releaseFiles.Count -eq 0) {
            throw "Velopack did not produce any release files in $releaseDir"
          }

          $portableFiles = @(
            $releaseFiles | Where-Object {
              $_.Name -match "(?i)(portable|\.zip$)"
            }
          )
          if ($portableFiles.Count -gt 0) {
            $portableNames = $portableFiles.Name -join ", "
            throw "Velopack produced unexpected portable release file(s): $portableNames"
          }

          $checksumPath = Join-Path $releaseDir "PullWatch-$env:RELEASE_TAG-win-x64.sha256"
          $checksumLines = $releaseFiles | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName
            "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), $_.Name
          }
          Set-Content -LiteralPath $checksumPath -Value $checksumLines -Encoding ASCII

          "release_dir=$releaseDir" >> $env:GITHUB_OUTPUT

      - name: Upload Velopack artifact
        uses: actions/upload-artifact@v7
        with:
          name: PullWatch-${{ steps.release-tag.outputs.tag }}-velopack-win-x64
          path: ${{ steps.package.outputs.release_dir }}/*
          if-no-files-found: error

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
          RELEASE_PRERELEASE: ${{ steps.release-tag.outputs.prerelease }}
        run: |
          $tag = $env:RELEASE_TAG
          $releaseDir = "${{ steps.package.outputs.release_dir }}"
          $releaseFiles = @(
            Get-ChildItem -LiteralPath $releaseDir -File |
              Sort-Object Name |
              ForEach-Object { $_.FullName }
          )
          $title = "PullWatch $tag"
          $prerelease = [System.StringComparer]::OrdinalIgnoreCase.Equals(
            $env:RELEASE_PRERELEASE,
            "true"
          )

          if ($releaseFiles.Count -eq 0) {
            throw "No Velopack release files found in $releaseDir"
          }

          gh release view $tag --json isImmutable 2>$null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            throw "GitHub Release $tag already exists. Create a new tag instead of replacing release assets."
          }

          $createArguments = @(
            "release",
            "create",
            $tag
          )
          $createArguments += $releaseFiles
          $createArguments += @(
            "--title",
            $title,
            "--generate-notes",
            "--verify-tag"
          )

          if ($prerelease) {
            $createArguments += "--prerelease"
          }

          gh @createArguments
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to create GitHub Release $tag"
          }
