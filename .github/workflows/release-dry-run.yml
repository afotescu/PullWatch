name: Release Dry Run
run-name: Release dry run ${{ github.event.inputs.version || '0.0.1-dryrun.1' }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to stamp into the dry-run build
        required: false
        default: 0.0.1-dryrun.1
        type: string
      bundle_ffmpeg:
        description: Bundle FFmpeg in the dry-run artifact
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIGURATION: Release
  PLATFORM: x64
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  PUBLISH_DIR: artifacts/publish/win-x64-dry-run
  VELOPACK_VERSION: 1.2.0
  VELOPACK_RELEASE_DIR: artifacts/velopack/dry-run
  FFMPEG_DOWNLOAD_URL: https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-8.1.2-essentials_build.zip
  FFMPEG_SHA256: db580001caa24ac104c8cb856cd113a87b0a443f7bdf47d8c12b1d740584a2ec

jobs:
  dry-run:
    name: Build and package release dry run
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Resolve dry-run version
        id: dry-run-version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "0.0.1-dryrun.1"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$') {
            throw "Dry-run version must look like 0.1.0 or 0.1.0-rc.1. Received: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore PullWatch.sln --locked-mode -p:Platform=${{ env.PLATFORM }}

      - name: Build
        run: dotnet build PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore -p:Platform=${{ env.PLATFORM }} -p:Version=${{ steps.dry-run-version.outputs.version }} -p:InformationalVersion=${{ steps.dry-run-version.outputs.version }}

      - name: Test
        run: dotnet test PullWatch.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build -p:Platform=${{ env.PLATFORM }}

      - name: Publish
        shell: pwsh
        env:
          DRY_RUN_VERSION: ${{ steps.dry-run-version.outputs.version }}
          BUNDLE_FFMPEG: ${{ github.event.inputs.bundle_ffmpeg }}
        run: |
          $arguments = @{
            OutputPath = $env:PUBLISH_DIR
            Version = $env:DRY_RUN_VERSION
            FfmpegDownloadUrl = $env:FFMPEG_DOWNLOAD_URL
            FfmpegSha256 = $env:FFMPEG_SHA256
            LockedRestore = $true
          }

          $bundleFfmpeg = [System.StringComparer]::OrdinalIgnoreCase.Equals(
            $env:BUNDLE_FFMPEG,
            "true"
          )
          if (!$bundleFfmpeg) {
            $arguments.SkipFfmpegBundle = $true
          }

          ./scripts/publish-win-x64.ps1 @arguments

      - name: Install Velopack CLI
        run: dotnet tool install --tool-path .tools vpk --version ${{ env.VELOPACK_VERSION }}

      - name: Package Velopack release
        id: package
        shell: pwsh
        env:
          DRY_RUN_VERSION: ${{ steps.dry-run-version.outputs.version }}
        run: |
          ./scripts/package-velopack-win-x64.ps1 `
            -PublishPath $env:PUBLISH_DIR `
            -ReleaseDir $env:VELOPACK_RELEASE_DIR `
            -Version $env:DRY_RUN_VERSION `
            -ChecksumFileName "PullWatch-dry-run-$($env:DRY_RUN_VERSION)-win-x64.sha256"

          "release_dir=$env:VELOPACK_RELEASE_DIR" >> $env:GITHUB_OUTPUT

      - name: Add VideoLAN source assets
        run: ./scripts/add-videolan-source-assets.ps1 -ReleaseDir ${{ steps.package.outputs.release_dir }}

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v7
        with:
          name: PullWatch-${{ steps.dry-run-version.outputs.version }}-dry-run-win-x64
          path: ${{ steps.package.outputs.release_dir }}/*
          if-no-files-found: error
          retention-days: 1
